<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locket Học Tập A1</title>
    
    <!-- Tối ưu hiển thị như một ứng dụng trên màn hình chính điện thoại -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Locket Học">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            color: #fff;
            padding: 15px;
            overflow-y: auto;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* GIAO DIỆN HỘP WIDGET LOCKET BO TRÒN */
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px 20px;
            border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 100%;
            width: 450px; 
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            z-index: 2;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff9a9e, #ff758c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .wish-box {
            font-size: 0.85rem;
            font-style: italic;
            color: #ffe4e6;
            margin-bottom: 10px;
            min-height: 20px;
            font-weight: 500;
            padding: 0 5px;
        }

        .current-date {
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .box {
            background: rgba(255, 255, 255, 0.15);
            padding: 12px 5px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .number {
            font-size: 2rem;
            font-weight: bold;
            color: #ff758c;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* MỤC TIÊU ĐIỂM SỐ */
        .target-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }

        .target-section h3 {
            font-size: 0.95rem;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 5px;
            opacity: 0.9;
        }

        .target-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .target-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px 5px;
            text-align: center;
        }

        .target-subject {
            font-size: 0.75rem;
            margin-bottom: 2px;
            color: #ffe4e6;
        }

        .target-score-input {
            width: 100%;
            background: transparent;
            border: none;
            color: #ffde43;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            outline: none;
        }

        /* STREAK HỌC TẬP LOCKET */
        .streak-section {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .streak-title {
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .streak-count {
            font-size: 1.6rem;
            color: #ffde43;
            font-weight: 800;
        }

        .streak-btn {
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
            box-shadow: 0 4px 10px rgba(255, 78, 80, 0.3);
        }

        /* NHIỆM VỤ CẦN LÀM */
        .todo-section {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
        }

        .todo-section h3 {
            font-size: 0.95rem;
            margin-bottom: 10px;
        }

        .todo-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .todo-input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.85rem;
            outline: none;
        }

        .todo-add-btn {
            background: #ff758c;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .todo-list {
            list-style: none;
            max-height: 120px;
            overflow-y: auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 5px;
            font-size: 0.85rem;
        }

        .todo-item.completed { opacity: 0.5; }
        .todo-item.completed .todo-text { text-decoration: line-through; }
        .todo-left { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .delete-todo-btn { background: none; border: none; color: #ff9a9e; }

        .hint-text {
            font-size: 0.75rem;
            opacity: 0.6;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>VÀO LỚP 10 2027</h1>
        <!-- NƠI HIỂN THỊ LỜI CHÚC MỖI NGÀY -->
        <div class="wish-box" id="wish-box">✨ Đang tải lời chúc dễ thương... ✨</div>
        <div class="current-date" id="current-date-box">--/--/---- --:--:--</div>
        
        <!-- ĐẾM NGƯỢC THỜI GIAN -->
        <div class="countdown" id="countdown-box">
            <div class="box"><span class="number" id="days">00</span><span class="label">Ngày</span></div>
            <div class="box"><span class="number" id="hours">00</span><span class="label">Giờ</span></div>
            <div class="box"><span class="number" id="minutes">00</span><span class="label">Phút</span></div>
            <div class="box"><span class="number" id="seconds">00</span><span class="label">Giây</span></div>
        </div>

        <!-- MỤC TIÊU ĐIỂM SỐ -->
        <div class="target-section">
            <h3>🎯 Điểm mục tiêu:</h3>
            <div class="target-grid">
                <div class="target-box"><div class="target-subject">Toán</div><input type="text" class="target-score-input" id="target-math" value="9+" onchange="saveTargets()"></div>
                <div class="target-box"><div class="target-subject">Văn</div><input type="text" class="target-score-input" id="target-literature" value="9+" onchange="saveTargets()"></div>
                <div class="target-box"><div class="target-subject">Anh</div><input type="text" class="target-score-input" id="target-english" value="8+" onchange="saveTargets()"></div>
                <div class="target-box"><div class="target-subject">Khác</div><input type="text" class="target-score-input" id="target-other" value="9+" onchange="saveTargets()"></div>
            </div>
        </div>

        <!-- CHUỖI HỌC TẬP (STREAK) -->
        <div class="streak-section">
            <div class="streak-title">Chuỗi học tập: <span class="streak-count" id="streak-num">🔥 0 ngày</span></div>
            <button class="streak-btn" id="streak-btn" onclick="claimStreak()">Hôm nay tớ đã học! 🔥</button>
        </div>

        <!-- BẢNG CÔNG VIỆC -->
        <div class="todo-section">
            <h3>🎯 Việc cần hoàn thành:</h3>
            <div class="todo-input-group">
                <input type="text" class="todo-input" id="todo-input" placeholder="Thêm việc cần làm..." onkeypress="handleKeyPress(event)">
                <button class="todo-add-btn" onclick="addTodo()">Thêm</button>
            </div>
            <ul class="todo-list" id="todo-list"></ul>
        </div>

        <p class="hint-text">💡 Bấm nút chia sẻ ở trình duyệt > "Thêm vào MH chính" để đưa ra màn hình như Locket!</p>
    </div>

    <script>
        // =========================================================================
        // KHU VỰC CHỈNH SỬA LỜI CHÚC (Bạn có thể thoải mái sửa đổi nội dung ở đây nha!)
        // =========================================================================
        const dailyWishes = [
            "🔥 Style tốt nha chú rồng nhỏ của A1! 🐉",
            "✨ Học đi babi ơi, tương lai xịn đét đang chờ kìa! ✨",
            "💖 Nay thi Toán 9+, Văn 9+ nha, làm được mà! 💖",
            "🚀 Giữ vững streak học tập hôm nay nhé rồng vàng! 🔥",
            "🌟 Đừng lười nữa nè, chăm chi để sau này khóc trên đống tiền nha! 😉",
            "🍀 May mắn và tự tin luôn bên cậu hôm nay! 🍀",
            "🎯 Hôm nay hoàn thành hết mục tiêu rồi lướt TikTok sau nhé! 🎯"
        ];
        // =========================================================================

        function setDailyWish() {
            const today = new Date();
            const index = (today.getDate() + today.getMonth()) % dailyWishes.length;
            document.getElementById("wish-box").innerText = dailyWishes[index];
        }

        function launchFireworks() {
            var duration = 2 * 1000; var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 50, origin: { x: 0, y: 0.8 } });
                confetti({ particleCount: 4, angle: 120, spread: 50, origin: { x: 1, y: 0.8 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        window.onload = function() {
            checkAndResetStreak(); updateStreakUI(); renderTodos(); loadTargets(); setDailyWish();
        };

        const examDate = new Date("June 25, 2027 07:30:00").getTime();
        function updateTimeAndCountdown() {
            const now = new Date();
            const daysOfWeek = ["CN", "T2", "T3", "T4", "T5", "T6", "T7"];
            document.getElementById("current-date-box").innerText = `${daysOfWeek[now.getDay()]}, ${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')} | ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;

            const gap = examDate - now.getTime();
            if (gap <= 0) {
                document.getElementById("countdown-box").innerHTML = "Cố lên nhé các chú rồng vàng 2k12! 🐉🔥";
                return;
            }
            const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;
            document.getElementById("days").innerText = String(Math.floor(gap / day)).padStart(2, '0');
            document.getElementById("hours").innerText = String(Math.floor((gap % day) / hour)).padStart(2, '0');
            document.getElementById("minutes").innerText = String(Math.floor((gap % hour) / minute)).padStart(2, '0');
            document.getElementById("seconds").innerText = String(Math.floor((gap % minute) / second)).padStart(2, '0');
        }
        setInterval(updateTimeAndCountdown, 1000); updateTimeAndCountdown();

        function saveTargets() {
            localStorage.setItem("locketTargets", JSON.stringify({
                math: document.getElementById("target-math").value,
                literature: document.getElementById("target-literature").value,
                english: document.getElementById("target-english").value,
                other: document.getElementById("target-other").value
            }));
        }
        function loadTargets() {
            const saved = JSON.parse(localStorage.getItem("locketTargets"));
            if (saved) {
                document.getElementById("target-math").value = saved.math || "9+";
                document.getElementById("target-literature").value = saved.literature || "9+";
                document.getElementById("target-english").value = saved.english || "8+";
                document.getElementById("target-other").value = saved.other || "9+";
            }
        }

        function getTodayString() { const t = new Date(); return t.getFullYear() + "-" + String(t.getMonth() + 1).padStart(2, '0') + "-" + String(t.getDate()).padStart(2, '0'); }
        function checkAndResetStreak() {
            let streak = parseInt(localStorage.getItem("streakCount")) || 0;
            let lastClaim = localStorage.getItem("lastClaimedDate");
            if (streak > 0 && lastClaim) {
                if (Math.ceil(Math.abs(new Date(getTodayString()) - new Date(lastClaim)) / (1000 * 60 * 60 * 24)) > 5) {
                    localStorage.setItem("streakCount", 0); localStorage.removeItem("lastClaimedDate");
                }
            }
        }
        function claimStreak() {
            let streak = parseInt(localStorage.getItem("streakCount")) || 0;
            let lastClaim = localStorage.getItem("lastClaimedDate"); const todayStr = getTodayString();
            if (lastClaim === todayStr) return;
            if (lastClaim) {
                streak = (Math.ceil(Math.abs(new Date(todayStr) - new Date(lastClaim)) / (1000 * 60 * 60 * 24)) <= 5) ? streak + 1 : 1;
            } else { streak = 1; }
            localStorage.setItem("streakCount", streak); localStorage.setItem("lastClaimedDate", todayStr);
            launchFireworks(); updateStreakUI();
        }
        function updateStreakUI() {
            const streak = parseInt(localStorage.getItem("streakCount")) || 0;
            document.getElementById("streak-num").innerText = `🔥 ${streak} ngày`;
            const btn = document.getElementById("streak-btn");
            if (localStorage.getItem("lastClaimedDate") === getTodayString()) {
                btn.innerText = "Đã tích chuỗi hôm nay! 👍"; btn.style.background = "#4ade80"; btn.style.boxShadow = "none";
            } else {
                btn.innerText = "Hôm nay tớ đã học! 🔥"; btn.style.background = "linear-gradient(45deg, #ff4e50, #f9d423)";
            }
        }

        let todos = JSON.parse(localStorage.getItem("todos")) || [];
        function renderTodos() {
            const list = document.getElementById("todo-list"); list.innerHTML = "";
            todos.forEach((todo, i) => {
                const li = document.createElement("li"); li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                li.innerHTML = `<div class="todo-left" onclick="toggleTodo(${i})"><input type="checkbox" ${todo.completed ? 'checked' : ''}> <span class="todo-text">${todo.text}</span></div><button class="delete-todo-btn" onclick="deleteTodo(${i})">🗑️</button>`;
                list.appendChild(li);
            });
        }
        function addTodo() {
            const input = document.getElementById("todo-input"); if (input.value.trim() === "") return;
            todos.push({ text: input.value.trim(), completed: false }); localStorage.setItem("todos", JSON.stringify(todos));
            input.value = ""; renderTodos();
        }
        function handleKeyPress(e) { if (e.key === "Enter") addTodo(); }
        function toggleTodo(i) {
            todos[i].completed = !todos[i].completed; localStorage.setItem("todos", JSON.stringify(todos));
            if (todos[i].completed) confetti({ particleCount: 15, spread: 20, origin: { y: 0.7 } });
            renderTodos();
        }
        function deleteTodo(i) { todos.splice(i, 1); localStorage.setItem("todos", JSON.stringify(todos)); renderTodos(); }
    </script>
</body>
</html>
