<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đếm Ngược Ngày Thi THPT </title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Bạn có thể đổi màu nền ở dòng dưới này nhé (Hiện tại là tone hồng tím cute) */
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            max-width: 90%;
            width: 600px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 2;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1rem;
            font-style: italic;
            margin-bottom: 30px;
            color: #fff;
            opacity: 0.9;
        }

        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .box {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            transition: transform 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .box:hover {
            transform: translateY(-5px);
        }

        .box span {
            display: block;
        }

        .number {
            font-size: 3rem;
            font-weight: bold;
            color: #ff758c;
            margin-bottom: 5px;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .quote {
            font-size: 1.1rem;
            border-left: 4px solid #ff758c;
            padding-left: 15px;
            text-align: left;
            font-style: italic;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 0 15px 15px 0;
        }

        @media (max-width: 480px) {
            .countdown {
                grid-template-columns: repeat(2, 1fr);
            }
            h1 {
                font-size: 1.8rem;
            }
            .number {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Đếm Ngược Thi THPT 2027</h1>
        <p class="subtitle">Hành trình vạn dặm khởi đầu từ một bước chân🎉 , tiến tới ước mơ phía trước 💐🌻 , những chú rồng vàng của a1 cố lên 🐉🎉🎆❤️...</p>
        
        <div class="countdown" id="countdown-box">
            <div class="box">
                <span class="number" id="days">00</span>
                <span class="label">Ngày</span>
            </div>
            <div class="box">
                <span class="number" id="hours">00</span>
                <span class="label">Giờ</span>
            </div>
            <div class="box">
                <span class="number" id="minutes">00</span>
                <span class="label">Phút</span>
            </div>
            <div class="box">
                <span class="number" id="seconds">00</span>
                <span class="label">Giây</span>
            </div>
        </div>

        <div class="quote">
            “Tương lai khóc hay cười phụ thuộc vào độ lười của quá khứ. Cố gắng hết mình mỗi ngày nhé!”
        </div>
    </div>

    <script>
        // Hàm bắn pháo hoa tung tóe chào mừng
        function launchFireworks() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.8 }
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.8 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // Vừa mở trang web lên là bắn pháo hoa luôn
        window.onload = function() {
            launchFireworks();
        };

        // Đặt ngày thi mục tiêu: 25 tháng 6 năm 2027
        const examDate = new Date("June 25, 2027 07:30:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const gap = examDate - now;

            if (gap <= 0) {
                document.querySelector(".container").innerHTML = "<h1>Chúc các chú rồng của 9a1 thi tốt! 🎆🎉✨</h1>";
                // Hết giờ thì cứ 2 giây lại bắn pháo hoa 1 lần ăn mừng
                setInterval(launchFireworks, 2000);
                return;
            }

            const second = 1000;
            const minute = second * 60;
            const hour = minute * 60;
            const day = hour * 24;

            const d = Math.floor(gap / day);
            const h = Math.floor((gap % day) / hour);
            const m = Math.floor((gap % hour) / minute);
            const s = Math.floor((gap % minute) / second);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
